<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Fond dynamique Géré via Canvas -->
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <!-- Interface Utilisateur -->
        <div id="ui-layer">
            <!-- Menu Principal -->
            <div id="main-menu" class="screen active">
                <div class="title">GEOMETRY DASH</div>
                <div class="subtitle">Sélection du Niveau</div>
                <div class="level-list">
                    <button class="btnplay" style="border-color: #00ffcc; color: #00ffcc; box-shadow: 0 0 10px #00ffcc" onclick="startGame(1)">1. STEREO MADNESS (Facile)</button>
                    <button class="btnplay" style="border-color: #ff00ff; color: #ff00ff; box-shadow: 0 0 10px #ff00ff" onclick="startGame(2)">2. BACK ON TRACK (Normal)</button>
                    <button class="btnplay" style="border-color: #00ff88; color: #00ff88; box-shadow: 0 0 10px #00ff88" onclick="startGame(3)">3. POLARGEIST (Difficile)</button>
                </div>
                <p>Appuyez sur ESPACE ou CLIQUEZ pour sauter / voler avec la fusée</p>
            </div>
            
            <!-- Écran de Game Over -->
            <div id="game-over-screen" class="screen">
                <h1 style="color: var(--danger-color)">GAME OVER</h1>
                <p>Progression: <span id="progress-percent">0</span>%</p>
                <div class="level-select">
                    <button class="btnplay" onclick="restartGame()">RÉESSAYER</button>
                    <button class="btnmenu" onclick="showMainMenu()">MENU PRINCIPAL</button>
                </div>
            </div>

            <!-- Écran de Victoire -->
            <div id="victory-screen" class="screen">
                <h1 style="color: #00ffcc">NIVEAU TERMINÉ !</h1>
                <p>Progression: 100%</p>
                <div class="level-select">
                    <button class="btnmenu" onclick="showMainMenu()">MENU PRINCIPAL</button>
                </div>
            </div>

            <!-- Barre de progression en jeu -->
            <div id="hud" class="hidden">
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="levels.js"></script>
    <script src="js/Constants.js"></script>
    <script src="js/Player.js"></script>
    <script src="js/Level.js"></script>
    <script src="js/Renderer.js"></script>
    <script src="js/InputManager.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
